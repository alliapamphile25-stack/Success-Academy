<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sessions en direct — LMS Platform</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/style.css">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800">

<header class="bg-white/90 backdrop-blur sticky top-0 z-40 border-b border-slate-100">
  <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2 font-bold text-xl text-blue-600">
      <span class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-600 to-green-500 flex items-center justify-center text-white text-sm">LP</span>
      LMS Platform
    </a>
    <div id="nav-user" class="hidden md:flex items-center gap-4">
      <a href="dashboard.html" class="text-sm font-medium text-slate-600 hover:text-blue-600">Mon espace</a>
      <a href="live.html" class="text-sm font-medium text-blue-600">Live</a>
      <a href="affiliate.html" class="text-sm font-medium text-slate-600 hover:text-blue-600">💰 Affiliation</a>
      <a href="#" id="nav-logout" class="text-sm font-semibold text-red-600 hover:text-red-700">Déconnexion</a>
    </div>
    <div id="nav-guest" class="hidden md:flex items-center gap-3">
      <a href="login.html" class="text-sm font-medium text-slate-600 hover:text-blue-600">Se connecter</a>
    </div>
  </nav>
</header>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <div id="live-list-view">
    <h1 class="text-2xl font-bold text-slate-900 mb-1">Sessions en direct</h1>
    <p class="text-slate-500 mb-6">Rejoignez les sessions live liées à vos formations.</p>
    <div id="live-sessions-list" class="grid sm:grid-cols-2 gap-4">
      <p class="text-slate-400">Chargement...</p>
    </div>
  </div>

  <div id="live-room-view" class="hidden">
    <a href="live.html" class="text-sm text-blue-600 hover:underline">← Retour aux sessions</a>
    <div class="grid lg:grid-cols-3 gap-6 mt-4">
      <div class="lg:col-span-2">
        <div id="live-player" class="bg-black rounded-xl overflow-hidden aspect-video"></div>
        <h1 id="live-title" class="text-xl font-bold text-slate-900 mt-4"></h1>
        <p id="live-description" class="text-sm text-slate-500 mt-1"></p>
      </div>
      <div class="bg-white rounded-xl border border-slate-100 flex flex-col h-[520px]">
        <div class="p-4 border-b border-slate-100 font-semibold text-sm text-slate-900">💬 Chat en direct</div>
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3 text-sm"></div>
        <form id="chat-form" class="p-3 border-t border-slate-100 flex gap-2">
          <input id="chat-input" type="text" placeholder="Écrivez un message..." class="flex-1 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" maxlength="500">
          <button class="bg-blue-600 text-white text-sm font-semibold px-4 py-2 rounded-lg hover:bg-blue-700">Envoyer</button>
        </form>
      </div>
    </div>
  </div>
</main>

<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/nav.js"></script>
<script src="assets/js/live.js"></script>
</body>
</html>
