<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sessions live — Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-slate-50 text-slate-800">

<div class="flex min-h-screen">
  <aside class="w-64 bg-slate-900 text-slate-300 hidden lg:flex flex-col">
    <div class="h-16 flex items-center px-6 font-bold text-white text-lg">
      <span class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-600 to-green-500 flex items-center justify-center text-sm mr-2">ET</span>
      Admin
    </div>
    <nav class="flex-1 px-3 space-y-1 text-sm">
      <a href="index.html" class="flex items-center gap-2 px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white">📊 Tableau de bord</a>
      <a href="courses.html" class="flex items-center gap-2 px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white">📚 Formations</a>
      <a href="live.html" class="flex items-center gap-2 px-3 py-2.5 rounded-lg bg-slate-800 text-white font-medium">🎥 Sessions live</a>
      <a href="testimonials.html" class="flex items-center gap-2 px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white">💬 Témoignages</a>
    </nav>
    <div class="p-3 border-t border-slate-800">
      <a href="../dashboard.html" class="block px-3 py-2 text-sm hover:text-white">← Retour au site</a>
      <a href="#" id="nav-logout" class="block px-3 py-2 text-sm text-red-400 hover:text-red-300">Déconnexion</a>
    </div>
  </aside>

  <main class="flex-1 p-6 lg:p-10">
    <div class="flex items-center justify-between flex-wrap gap-4">
      <div>
        <h1 class="text-2xl font-bold text-slate-900">Sessions live</h1>
        <p class="text-slate-500 mt-1">Planifiez des sessions en direct sur YouTube ou Zoom, avec chat intégré.</p>
      </div>
      <button id="btn-new-live" class="bg-blue-600 text-white font-semibold px-4 py-2.5 rounded-lg hover:bg-blue-700 transition text-sm">+ Nouvelle session live</button>
    </div>

    <div id="live-admin-list" class="mt-8 space-y-3">
      <p class="text-slate-400">Chargement...</p>
    </div>
  </main>
</div>

<!-- Modale : créer une session live -->
<div id="modal-live" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
  <div class="bg-white rounded-xl max-w-lg w-full p-6 max-h-[90vh] overflow-y-auto">
    <h2 class="font-bold text-lg text-slate-900 mb-4">Nouvelle session live</h2>
    <form id="live-form" class="space-y-3">
      <div>
        <label class="block text-xs font-semibold text-slate-500 mb-1">Formation</label>
        <select name="course" id="live-course-select" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm"></select>
      </div>
      <input name="title" required placeholder="Titre de la session" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
      <textarea name="description" placeholder="Description (optionnel)" rows="2" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm"></textarea>

      <div>
        <label class="block text-xs font-semibold text-slate-500 mb-1">Plateforme</label>
        <div class="flex gap-4 text-sm">
          <label class="flex items-center gap-1.5"><input type="radio" name="platform" value="youtube" checked> YouTube Live</label>
          <label class="flex items-center gap-1.5"><input type="radio" name="platform" value="zoom"> Zoom</label>
        </div>
      </div>

      <div id="field-youtube">
        <label class="block text-xs font-semibold text-slate-500 mb-1">ID de la vidéo YouTube</label>
        <input name="youtubeVideoId" placeholder="ex: jfKfPfyJRdk (dans l'URL après v=)" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
      </div>
      <div id="field-zoom" class="hidden">
        <label class="block text-xs font-semibold text-slate-500 mb-1">Lien de la réunion Zoom</label>
        <input name="zoomJoinUrl" placeholder="https://zoom.us/j/xxxxxxxxx" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-500 mb-1">Date et heure</label>
        <input name="scheduledAt" type="datetime-local" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
      </div>

      <div class="flex gap-3 pt-2">
        <button type="button" id="btn-cancel-live" class="flex-1 border border-slate-300 rounded-lg py-2.5 text-sm font-semibold">Annuler</button>
        <button class="flex-1 bg-blue-600 text-white rounded-lg py-2.5 text-sm font-semibold hover:bg-blue-700">Planifier</button>
      </div>
    </form>
  </div>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/admin-live.js"></script>
</body>
</html>
