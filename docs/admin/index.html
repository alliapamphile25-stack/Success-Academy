<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration — LMS Platform</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-slate-50 text-slate-800">

<div class="flex min-h-screen">
  <!-- Sidebar admin -->
  <aside class="w-64 bg-slate-900 text-slate-300 hidden lg:flex flex-col">
    <div class="h-16 flex items-center px-6 font-bold text-white text-lg">
      <span class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-600 to-green-500 flex items-center justify-center text-sm mr-2">LP</span>
      Admin
    </div>
    <nav class="flex-1 px-3 space-y-1 text-sm">
      <a href="index.html" class="flex items-center gap-2 px-3 py-2.5 rounded-lg bg-slate-800 text-white font-medium">📊 Tableau de bord</a>
      <a href="courses.html" class="flex items-center gap-2 px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white">📚 Formations</a>
      <a href="live.html" class="flex items-center gap-2 px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white">🎥 Sessions live</a>
      <a href="testimonials.html" class="flex items-center gap-2 px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white">💬 Témoignages</a>
    </nav>
    <div class="p-3 border-t border-slate-800">
      <a href="../dashboard.html" class="block px-3 py-2 text-sm hover:text-white">← Retour au site</a>
      <a href="#" id="nav-logout" class="block px-3 py-2 text-sm text-red-400 hover:text-red-300">Déconnexion</a>
    </div>
  </aside>

  <main class="flex-1 p-6 lg:p-10">
    <h1 class="text-2xl font-bold text-slate-900">Tableau de bord administrateur</h1>
    <p class="text-slate-500 mt-1">Vue d'ensemble de la plateforme.</p>

    <div id="stats-grid" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4 mt-8">
      <div class="bg-white rounded-xl border border-slate-100 p-5">
        <p class="text-sm text-slate-500">Apprenants</p>
        <p id="stat-users" class="text-3xl font-bold text-slate-900 mt-1">–</p>
      </div>
      <div class="bg-white rounded-xl border border-slate-100 p-5">
        <p class="text-sm text-slate-500">Formations</p>
        <p id="stat-courses" class="text-3xl font-bold text-slate-900 mt-1">–</p>
      </div>
      <div class="bg-white rounded-xl border border-slate-100 p-5">
        <p class="text-sm text-slate-500">Inscriptions</p>
        <p id="stat-enrollments" class="text-3xl font-bold text-slate-900 mt-1">–</p>
      </div>
      <div class="bg-white rounded-xl border border-slate-100 p-5">
        <p class="text-sm text-slate-500">Revenus</p>
        <p id="stat-revenue" class="text-3xl font-bold text-green-600 mt-1">–</p>
      </div>
    </div>

    <div class="grid lg:grid-cols-2 gap-6 mt-10">
      <div class="bg-white rounded-xl border border-slate-100 p-6">
        <h2 class="font-semibold text-slate-900 mb-4">Utilisateurs récents</h2>
        <div id="users-table" class="text-sm divide-y divide-slate-100"></div>
      </div>
      <div class="bg-white rounded-xl border border-slate-100 p-6">
        <h2 class="font-semibold text-slate-900 mb-4">Ventes récentes</h2>
        <div id="sales-table" class="text-sm divide-y divide-slate-100"></div>
      </div>
    </div>

    <div class="bg-white rounded-xl border border-slate-100 p-6 mt-6">
      <h2 class="font-semibold text-slate-900 mb-4">💰 Commissions d'affiliation</h2>
      <div id="commissions-table" class="text-sm divide-y divide-slate-100"></div>
    </div>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/admin.js"></script>
</body>
</html>
