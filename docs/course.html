<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formation — Elite Tranaing</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-slate-50 text-slate-800">

<header class="bg-white/90 backdrop-blur sticky top-0 z-40 border-b border-slate-100">
  <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2 font-bold text-xl text-blue-600">
      <span class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-600 to-green-500 flex items-center justify-center text-white text-sm">LP</span>
      Elite Tranaing
    </a>
    <div id="nav-user" class="hidden md:flex items-center gap-4">
      <a href="dashboard.html" class="text-sm font-medium text-slate-600 hover:text-blue-600">Mon espace</a>
      <a id="nav-admin" href="admin/index.html" class="hidden text-sm font-medium text-slate-600 hover:text-blue-600">Admin</a>
      <a href="#" id="nav-logout" class="text-sm font-semibold text-red-600 hover:text-red-700">Déconnexion</a>
    </div>
    <div id="nav-guest" class="hidden md:flex items-center gap-3">
      <a href="login.html" class="text-sm font-medium text-slate-600 hover:text-blue-600">Se connecter</a>
      <a href="register.html" class="text-sm font-semibold bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">S'inscrire</a>
    </div>
  </nav>
</header>

<main id="course-container" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <p class="text-slate-400">Chargement de la formation...</p>
</main>

<!-- Template (masqué) réutilisé par course.js -->
<template id="course-template">
  <div class="grid lg:grid-cols-3 gap-8">
    <div class="lg:col-span-2 space-y-6">
      <div>
        <h1 id="course-title" class="text-2xl font-bold text-slate-900"></h1>
        <p id="course-instructor" class="text-sm text-slate-500 mt-1"></p>
      </div>

      <!-- Zone de contenu de la leçon active -->
      <div id="lesson-player" class="bg-black rounded-xl overflow-hidden aspect-video flex items-center justify-center text-slate-400">
        Sélectionnez une leçon pour commencer
      </div>

      <div class="flex items-center justify-between">
        <h2 id="lesson-title" class="text-lg font-semibold text-slate-900"></h2>
        <button id="btn-complete" class="hidden bg-green-600 text-white text-sm font-semibold px-4 py-2 rounded-lg hover:bg-green-700 transition">Marquer comme terminé →</button>
      </div>

      <!-- Bloc Quiz -->
      <div id="quiz-block" class="hidden bg-white rounded-xl border border-slate-100 p-6"></div>

      <!-- Bloc Commentaires -->
      <div class="bg-white rounded-xl border border-slate-100 p-6">
        <h3 class="font-semibold text-slate-900 mb-4">Questions & commentaires</h3>
        <form id="comment-form" class="flex gap-3 mb-6">
          <input type="text" id="comment-input" placeholder="Posez une question au formateur..." class="flex-1 border border-slate-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
          <button class="bg-blue-600 text-white text-sm font-semibold px-4 py-2 rounded-lg hover:bg-blue-700">Envoyer</button>
        </form>
        <div id="comments-list" class="space-y-4"></div>
      </div>
    </div>

    <!-- Sidebar : modules & leçons -->
    <aside class="bg-white rounded-xl border border-slate-100 p-5 h-fit lg:sticky lg:top-24">
      <div id="enroll-box" class="hidden mb-5 p-4 bg-blue-50 rounded-lg border border-blue-100 text-center">
        <p id="course-price" class="text-2xl font-bold text-slate-900"></p>
        <button id="btn-enroll" class="mt-3 w-full bg-blue-600 text-white font-semibold py-2.5 rounded-lg hover:bg-blue-700 transition text-sm">S'inscrire à cette formation</button>
      </div>
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-semibold text-slate-900">Contenu de la formation</h3>
        <span id="course-progress-label" class="text-xs text-slate-500"></span>
      </div>
      <div class="progress-bar-track mb-5"><div id="sidebar-progress-fill" class="progress-bar-fill" style="width:0%"></div></div>
      <div id="modules-list" class="space-y-4"></div>
    </aside>
  </div>
</template>

<script src="assets/js/config.js"></script>
<script src="assets/js/whatsapp-widget.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/nav.js"></script>
<script src="assets/js/course.js"></script>
</body>
</html>
